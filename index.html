<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Veeaa Studio — made in Male'</title>
<meta name="description" content="Veeaa Studio — books, handcrafted things & digital tools made in Male'. Visit our studio at studio.veeaa.com." />
<meta name="theme-color" content="#0E1B1E" />
<meta property="og:site_name" content="Veeaa Studio" />
<meta property="og:type" content="website" />
<meta property="og:title" content="Veeaa Studio — made in Male'" />
<meta property="og:description" content="Books, handcrafted things & digital tools made in Male'. Visit the studio." />
<meta property="og:url" content="https://www.veeaa.com/" />
<meta property="og:image" content="https://studio.veeaa.com/assets/og/og-default.png" />
<meta name="twitter:card" content="summary_large_image" />
<link rel="icon" href="https://studio.veeaa.com/favicon.svg" type="image/svg+xml" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;450;500&display=swap" rel="stylesheet" />
<style>
  :root{--ink:#0E1B1E;--bg:#F4F2EC;--paper:#fff;--accent:#0FA3A3;--accent-ink:#0A6E6E;
    --line:rgba(14,27,30,.10);--muted:rgba(14,27,30,.56)}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:"Inter",system-ui,sans-serif;background:var(--bg);color:var(--ink);
    min-height:100svh;display:grid;place-items:center;padding:24px;
    background-image:radial-gradient(55% 45% at 80% 10%, rgba(15,163,163,.16), transparent 70%),
      radial-gradient(45% 40% at 10% 90%, rgba(232,115,74,.10), transparent 70%)}
  .card{max-width:520px;width:100%;text-align:center}
  .chip{width:64px;height:64px;border-radius:18px;background:var(--ink);color:var(--bg);
    display:grid;place-items:center;font-family:"Space Grotesk";font-style:italic;font-size:2rem;
    font-weight:700;margin:0 auto 22px}
  h1{font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:clamp(1.9rem,6vw,2.6rem);
    letter-spacing:-.02em;line-height:1.08}
  h1 em{font-style:normal;color:var(--accent-ink)}
  p{color:var(--muted);margin:14px auto 26px;max-width:38ch;font-size:1.05rem}
  .btn{display:inline-flex;align-items:center;gap:.5rem;font-family:"Space Grotesk";font-weight:600;
    font-size:1.05rem;padding:1rem 1.7rem;border-radius:999px;background:var(--ink);color:var(--bg);
    text-decoration:none;transition:transform .2s ease,box-shadow .2s ease}
  .btn:hover{transform:translateY(-2px);box-shadow:0 14px 34px -14px rgba(14,27,30,.5)}
  .links{margin-top:26px;display:flex;gap:1.4rem;justify-content:center;flex-wrap:wrap}
  .links a{color:var(--muted);text-decoration:none;font-size:.92rem}
  .links a:hover{color:var(--ink)}
  .foot{margin-top:40px;font-size:.78rem;color:var(--muted)}
</style>
</head>
<body>
  <main class="card">
    <div class="chip">V</div>
    <h1>Veeaa Studio has a <em>new home.</em></h1>
    <p>Books, handcrafted things &amp; digital tools — made in Male', shipped worldwide.</p>
    <a class="btn" href="https://studio.veeaa.com">Visit the studio &rarr;</a>
    <div class="links">
      <a href="https://instagram.com/veeaastudio" target="_blank" rel="noopener">Instagram</a>
      <a href="https://facebook.com/VeeaaStudio" target="_blank" rel="noopener">Facebook</a>
      <a href="https://wa.me/9609115583">WhatsApp</a>
    </div>
    <div class="foot">Veeaa Studio · Veeaa Private Limited · Male', Maldives 🇲🇻</div>
  </main>
</body>
</html>
